id: ai-code-quality
purpose: >
  Prevent common over-engineering patterns in AI-generated code.
  AI agents tend to implement speculative features, unnecessary abstractions,
  and configuration systems for values that never change.
  This inflates complexity and maintenance burden.
violations:
  - Abstract class/interface with only one implementation
  - Configuration system for values that are effectively constants
  - Error handling for cases that cannot occur given the current code paths
  - Features implemented proactively that are not in requirements/specs
  - Factory/Strategy/Builder patterns with only one concrete variant
  - Commented-out code or "TODO: implement" placeholders left by agents
good_examples:
  - title: "Direct implementation, no unnecessary abstraction"
    code: |
      class EmailService {
        constructor(private mailer: Resend) {}
        async send(to: string, subject: string, body: string) {
          await this.mailer.emails.send({ from: "noreply@app.com", to, subject, html: body });
        }
      }
bad_examples:
  - title: "Over-abstracted with single implementation"
    code: |
      interface IMessageChannel {
        send(msg: Message): Promise<void>;
      }
      interface IMessageFormatter {
        format(template: string, vars: Record<string, any>): string;
      }
      class MessageChannelFactory {
        create(type: "email" | "sms" | "push"): IMessageChannel {
          // Only EmailChannel is ever instantiated
          return new EmailChannel();
        }
      }
  - title: "Config system for constants"
    code: |
      // config/notification.ts
      export const NOTIFICATION_CONFIG = {
        maxRetries: 3,          // never changed
        retryDelay: 1000,       // never changed
        channels: ["email"],    // never changed
        templates: { ... }      // never changed
      };
      // Could just be inline constants
context_hint: >
  Count how many concrete implementations exist for each interface/abstract class.
  If only one exists, it's likely over-engineering.
  Check Factory/Strategy patterns — do they produce multiple variants or just one?
